<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">NoteStore Lab social preview source</title>
  <desc id="desc">A social preview source image for a copy-first Apple Notes recovery and review workflow with bounded AI review, evidence-backed case Q&amp;A, and a local MCP surface for Codex and Claude Code.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f6f0e4"/>
      <stop offset="100%" stop-color="#d7e5ef"/>
    </linearGradient>
    <linearGradient id="panelGlow" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#16222b"/>
      <stop offset="100%" stop-color="#0f1318"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="48" y="48" width="1184" height="544" rx="34" fill="url(#panelGlow)"/>
  <rect x="92" y="96" width="180" height="34" rx="17" fill="#1c2a34" stroke="#3a5366" stroke-width="1.5"/>
  <text x="114" y="119" fill="#8cc5ff" font-family="Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="700">copy-first + local-first</text>
  <text x="92" y="168" fill="#f5f1e8" font-family="Menlo, Monaco, Consolas, monospace" font-size="28">NoteStore Lab</text>
  <text x="92" y="244" fill="#f5f1e8" font-family="Menlo, Monaco, Consolas, monospace" font-size="36" font-weight="700">Copy-first Apple Notes recovery,</text>
  <text x="92" y="292" fill="#f5f1e8" font-family="Menlo, Monaco, Consolas, monospace" font-size="36" font-weight="700">bounded AI review, and local MCP.</text>
  <text x="92" y="336" fill="#bdd0df" font-family="Menlo, Monaco, Consolas, monospace" font-size="21">One copied-evidence case root. One review layer. One local</text>
  <text x="92" y="366" fill="#bdd0df" font-family="Menlo, Monaco, Consolas, monospace" font-size="21">entrypoint for Codex and Claude Code style workflows.</text>

  <rect x="92" y="410" width="336" height="126" rx="20" fill="#172334" stroke="#4d6d90" stroke-width="2"/>
  <text x="118" y="446" fill="#8cc5ff" font-family="Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="700">Prove it fast</text>
  <text x="118" y="482" fill="#f5f1e8" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">notes-recovery demo</text>
  <text x="118" y="504" fill="#d5dde6" font-family="Menlo, Monaco, Consolas, monospace" font-size="17">- safe case-root preview</text>
  <text x="118" y="528" fill="#d5dde6" font-family="Menlo, Monaco, Consolas, monospace" font-size="17">- verification + report</text>

  <rect x="452" y="410" width="336" height="126" rx="20" fill="#1f2718" stroke="#5f8b4d" stroke-width="2"/>
  <text x="478" y="446" fill="#a9e48d" font-family="Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="700">Review it with AI</text>
  <text x="478" y="482" fill="#f5f1e8" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">ai-review --demo</text>
  <text x="478" y="504" fill="#d5dde6" font-family="Menlo, Monaco, Consolas, monospace" font-size="17">- triage + next steps</text>
  <text x="478" y="528" fill="#d5dde6" font-family="Menlo, Monaco, Consolas, monospace" font-size="17">- evidence refs</text>

  <rect x="812" y="410" width="372" height="126" rx="20" fill="#2a191f" stroke="#9b5d74" stroke-width="2"/>
  <text x="838" y="446" fill="#ffb1ca" font-family="Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="700">Mount it in local agents</text>
  <text x="838" y="482" fill="#f5f1e8" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">project .codex/config.toml</text>
  <text x="838" y="510" fill="#f5f1e8" font-family="Menlo, Monaco, Consolas, monospace" font-size="18">project .mcp.json</text>
  <text x="838" y="528" fill="#d5dde6" font-family="Menlo, Monaco, Consolas, monospace" font-size="17">- Codex + Claude ready</text>

  <text x="92" y="572" fill="#c9d3de" font-family="Menlo, Monaco, Consolas, monospace" font-size="16">Tracked source for GitHub social preview. Export a 1280x640 PNG before upload.</text>
</svg>
